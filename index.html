<!DOCTYPE html>
<html>
<head>
<title>For Riya 🌹</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#1e3c72,#ff4b5c);
overflow:hidden;
text-align:center;
color:white;
}

/* flower background */

.flower{
position:absolute;
font-size:22px;
animation:float 8s linear infinite;
opacity:0.8;
}

@keyframes float{
0%{
transform:translateY(100vh) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(-10vh) rotate(360deg);
opacity:0;
}
}

/* rose opening */

#rose{
font-size:80px;
animation:bloom 2s ease forwards;
}

@keyframes bloom{
0%{
transform:scale(0);
opacity:0;
}
100%{
transform:scale(1);
opacity:1;
}
}

#main{
display:none;
}

button{
padding:12px 28px;
font-size:18px;
border:none;
border-radius:30px;
margin:10px;
cursor:pointer;
transition:0.3s;
}

#yes{
background:#ff2e63;
color:white;
}

#yes:hover{
transform:scale(1.15);
}

#no{
background:#3a7bd5;
color:white;
position:relative;
}

</style>

</head>

<body>

<div id="rose">🌹</div>

<div id="main">
<h1>Hey Riya ❤️</h1>
<p id="message"></p>
<h2>Do you like me? 🥺</h2>

<button id="yes" onclick="yes()">Yes 💖</button>
<button id="no" onclick="noClick()">No 🙈</button>
</div>

<script>

/* show main after rose animation */

setTimeout(function(){
document.getElementById("rose").style.display="none";
document.getElementById("main").style.display="block";
typing();
},2000);

/* typing message */

var text="I've wanted to ask you something for a long time...";
var i=0;

function typing(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,60);
}
}

/* yes button */

function yes(){
document.body.innerHTML=
"<h1>Riya ❤️</h1><h2>You just made me the happiest person today 🌹</h2><p>I knew you liked me too 😊</p>";
}

/* no button logic */

var noCount=0;

var messages=[
"Are you sure?",
"Really sure?",
"Absolutely sure?",
"Think again...",
"Last chance?",
"Still no?",
"Are you really sure Riya?",
"Maybe reconsider?",
"Don't break my heart 😅"
];

function noClick(){

noCount++;

if(noCount<56){

var msg=messages[Math.floor(Math.random()*messages.length)];

alert(msg);

}else{

moveButton();

}

}

/* make button run */

function moveButton(){

var btn=document.getElementById("no");

var x=Math.random()*window.innerWidth;
var y=Math.random()*window.innerHeight;

btn.style.position="absolute";
btn.style.left=x+"px";
btn.style.top=y+"px";

}

/* floating flowers */

setInterval(function(){

let flower=document.createElement("div");

flower.className="flower";
flower.innerHTML="🌸";

flower.style.left=Math.random()*100+"vw";
flower.style.fontSize=(Math.random()*20+15)+"px";

document.body.appendChild(flower);

setTimeout(()=>{flower.remove();},8000);

},500);

</script>

</body>
</html>
