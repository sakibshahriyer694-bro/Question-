<!DOCTYPE html>
<html>
<head>
<title>For Riya ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
overflow:hidden;
text-align:center;
color:white;
}

h1{
font-size:45px;
margin-bottom:10px;
}

#message{
font-size:22px;
margin-bottom:20px;
min-height:30px;
}

button{
padding:12px 28px;
font-size:18px;
border:none;
border-radius:30px;
margin:10px;
cursor:pointer;
transition:0.3s;
}

#yes{
background:#ff2e63;
color:white;
}

#yes:hover{
transform:scale(1.15);
}

#no{
background:white;
color:black;
position:absolute;
}

.heart{
position:absolute;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-10vh);
opacity:0;
}
}

</style>

</head>

<body>

<h1>Hey Riya ❤️</h1>

<div id="message"></div>

<h2>Do you like me? 🥺</h2>

<div>
<button id="yes" onclick="yes()">Yes 💖</button>
<button id="no" onmouseover="move()">No 🙈</button>
</div>

<script>

/* typing message */

var text="I've wanted to tell you something for a long time...";
var i=0;

function typing(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,60);
}
}

typing();

/* yes button */

function yes(){
document.body.innerHTML=
"<h1>Riya ❤️</h1><h2>You just made me the happiest person today 🥰</h2><p>I knew you liked me too 😌</p>";
}

/* no button escapes */

function move(){

var x=Math.random()*window.innerWidth;
var y=Math.random()*window.innerHeight;

var btn=document.getElementById("no");

btn.style.left=x+"px";
btn.style.top=y+"px";

}

/* floating hearts */

setInterval(function(){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+10)+"px";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},6000);

},400);

</script>

</body>
</html>
