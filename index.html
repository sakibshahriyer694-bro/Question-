<!DOCTYPE html>
<html>
<head>
<title>A Question For You ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    overflow:hidden;
}

h1{
    color:white;
    font-size:40px;
    text-align:center;
}

p{
    color:white;
    font-size:20px;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:25px;
    margin:10px;
    cursor:pointer;
    transition:0.3s;
}

#yes{
    background:#ff4d6d;
    color:white;
}

#yes:hover{
    transform:scale(1.1);
}

#no{
    background:white;
    position:absolute;
}

/* floating hearts */

.heart{
    position:absolute;
    color:white;
    font-size:20px;
    animation:float 6s linear infinite;
}

@keyframes float{
    0%{
        transform:translateY(100vh);
        opacity:1;
    }
    100%{
        transform:translateY(-10vh);
        opacity:0;
    }
}
</style>

</head>

<body>

<h1>Hey ❤️</h1>
<p>I want to ask you something...</p>
<h2 style="color:white;">Do you like me? 🥺</h2>

<div>
<button id="yes" onclick="yes()">Yes 💖</button>
<button id="no" onmouseover="move()">No 🙈</button>
</div>

<script>

function yes(){
document.body.innerHTML =
"<h1 style='color:white'>I knew it! 💕</h1><p style='color:white'>You just made my day 😊</p>";
}

function move(){
var x=Math.random()*window.innerWidth;
var y=Math.random()*window.innerHeight;

var btn=document.getElementById("no");

btn.style.left=x+"px";
btn.style.top=y+"px";
}

/* create floating hearts */

setInterval(function(){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+10)+"px";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},6000);

},500);

</script>

</body>
</html>
