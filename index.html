<!DOCTYPE html>
<html>
<head>
<title>Important Question</title>
<style>
body{
    text-align:center;
    font-family: Arial;
    background:#ffe6f0;
    margin-top:100px;
}
button{
    padding:12px 25px;
    font-size:18px;
    margin:10px;
    cursor:pointer;
}
#no{
    position:absolute;
}
</style>
</head>

<body>

<h1>I have a question for you ❤️</h1>
<h2>Do you like me?</h2>

<button onclick="yes()">Yes 💖</button>
<button id="no" onmouseover="move()">No 😅</button>

<script>
function yes(){
    document.body.innerHTML = "<h1>I knew it! 😌❤️</h1><p>You just made my day.</p>";
}

function move(){
    var x = Math.random() * window.innerWidth;
    var y = Math.random() * window.innerHeight;
    document.getElementById("no").style.left = x + "px";
    document.getElementById("no").style.top = y + "px";
}
</script>

</body>
</html>
